# OA — Operational Analytics Configuration
# Auto-generated by `oa init`. Edit freely.

# Path to your OpenClaw installation
openclaw_home: ~/.openclaw

# SQLite database path (relative to project root)
db_path: data/monitor.db

# Agents in your team (auto-detected from OpenClaw)
agents:
  - id: main
    name: Main Agent

# Goals to track
goals:
  # G1: Cron Reliability (built-in)
  - id: cron_reliability
    name: Cron Reliability
    builtin: true
    metrics:
      - name: success_rate
        unit: "%"
        healthy: 95
        warning: 80

  # G2: Team Health (built-in)
  - id: team_health
    name: Team Health
    builtin: true
    metrics:
      - name: active_agent_count
        unit: count
        healthy: 3
        warning: 2
      - name: memory_discipline
        unit: "%"
        healthy: 80
        warning: 50

  # G3: Knowledge Growth (built-in)
  - id: knowledge_growth
    name: Knowledge Growth
    builtin: true
    metrics:
      - name: total_memories
        unit: count
        healthy: 100
        warning: 50
      - name: daily_new_memories
        unit: count
        healthy: 3
        warning: 1
      - name: queue_throughput
        unit: count
        healthy: 30
        warning: 10
      - name: vectordb_documents
        unit: count
        healthy: 30
        warning: 10

  # G4: Conversation Quality (built-in)
  - id: conversation_quality
    name: Conversation Quality
    builtin: true
    metrics:
      - name: message_throughput
        unit: count
        healthy: 100
        warning: 30
      - name: processing_success_rate
        unit: count
        healthy: 15
        warning: 5
      - name: pending_ratio
        unit: count
        healthy: 2
        warning: 1

  # G5: Heartbeat Status (built-in)
  - id: heartbeat_status
    name: Heartbeat Status
    builtin: true
    metrics:
      - name: heartbeat_alive_rate
        unit: "%"
        healthy: 80
        warning: 50
      - name: todo_completion
        unit: "%"
        healthy: 70
        warning: 40
      - name: reports_generated
        unit: "%"
        healthy: 80
        warning: 50

  # G6: Infrastructure Health (built-in)
  - id: infra_health
    name: Infrastructure Health
    builtin: true
    metrics:
      - name: vectordb_size_kb
        unit: count
        healthy: 1000
        warning: 100
      - name: gateway_alive
        unit: count
        healthy: 1
        warning: 0
      - name: session_storage_mb
        unit: count
        healthy: 10
        warning: 1

  # G7: Self Improvement (populated by oa heal, not oa collect)
  - id: self_improvement
    name: Self Improvement
    builtin: true
    metrics:
      - name: heal_score
        unit: "%"
        healthy: 80
        warning: 50
      - name: daily_tokens
        unit: count
        healthy: 200000    # lower is better
        warning: 500000
      - name: memory_duplicates
        unit: count
        healthy: 10         # lower is better
        warning: 50
      - name: long_sessions
        unit: count
        healthy: 2          # lower is better
        warning: 5
      - name: skills_missing_doc
        unit: count
        healthy: 1          # lower is better
        warning: 3
