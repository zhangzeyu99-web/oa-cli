# OA — Operational Analytics Configuration
# Auto-generated by `oa init`. Edit freely.
#
# Documentation: https://github.com/motusai/oa-cli

# Path to your OpenClaw installation
openclaw_home: ~/.openclaw

# SQLite database path (relative to project root)
db_path: data/monitor.db

# Agents in your team
# Auto-detected from OpenClaw sessions. Add/remove as needed.
agents:
  - id: researcher
    name: Researcher
  - id: writer
    name: Writer
  - id: reviewer
    name: Reviewer
  - id: publisher
    name: Publisher

# Goals to track
# Built-in goals read directly from OpenClaw data — zero config needed.
# Add custom goals with your own pipeline scripts.
goals:
  # G1: Cron Reliability (built-in)
  # Reads: ~/.openclaw/cron/jobs.json + runs/*.jsonl
  - id: cron_reliability
    name: Cron Reliability
    builtin: true
    metrics:
      - name: success_rate
        unit: "%"
        healthy: 95    # green if >= 95%
        warning: 80    # yellow if >= 80%, red if below

  # G2: Team Health (built-in)
  # Reads: ~/.openclaw/sessions/ + agent memory files
  - id: team_health
    name: Team Health
    builtin: true
    metrics:
      - name: active_agent_count
        unit: count
        healthy: 3     # green if >= 3 agents active
        warning: 2     # yellow if >= 2, red if below
      - name: memory_discipline
        unit: "%"
        healthy: 80    # green if >= 80% of agents logged memory
        warning: 50

  # Example: Custom goal (uncomment and edit)
  # - id: content_quality
  #   name: Content Quality
  #   builtin: false
  #   pipeline: pipelines/content_quality.py
  #   metrics:
  #     - name: approval_rate
  #       unit: "%"
  #       healthy: 90
  #       warning: 70
